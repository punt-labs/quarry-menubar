name: Release

# Publishes a prebuilt, universal QuarryMenuBar.app to a GitHub Release.
#
# The app is built on a macOS runner OUTSIDE any Homebrew sandbox, so SwiftPM
# resolves HighlightSwift normally - no sandbox workarounds. The Release build
# is ad-hoc signed ("Sign to Run Locally") by default; because the Homebrew
# FORMULA (not a cask) that consumes this asset does not quarantine downloads,
# the installed app launches without Developer ID or notarization.
#
# Trigger: push a tag `vX.Y.Z` whose version matches project.yml
# MARKETING_VERSION. Release cadence is manual (tag when you want to ship).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build universal app and publish release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install XcodeGen
        run: |
          if brew list xcodegen &>/dev/null; then
            brew link --overwrite xcodegen
          else
            brew install xcodegen
          fi

      - name: Resolve version and verify tag matches project.yml
        id: version
        run: |
          version=$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          tag="${GITHUB_REF_NAME}"
          if [ "v$version" != "$tag" ]; then
            echo "::error::Tag $tag does not match project.yml MARKETING_VERSION v$version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build universal Release app
        run: |
          xcodebuild build \
            -scheme QuarryMenuBar \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            -quiet

      - name: Verify the binary is universal (arm64 + x86_64)
        run: |
          bin="build/Build/Products/Release/QuarryMenuBar.app/Contents/MacOS/QuarryMenuBar"
          archs=$(lipo -archs "$bin")
          echo "archs: $archs"
          echo "$archs" | grep -q arm64
          echo "$archs" | grep -q x86_64

      - name: Package the app (wrapped, xattr-stripped zip)
        id: package
        run: |
          version="${{ steps.version.outputs.version }}"
          zip="QuarryMenuBar-v${version}-macos-universal.zip"
          # Wrap one directory deep: Homebrew's staging descends into a single
          # top-level directory, so the wrapper lets `prefix.install
          # "QuarryMenuBar.app"` resolve. --norsrc/--noextattr/--noacl strip
          # AppleDouble metadata; otherwise Homebrew's unzip materializes ._*
          # sidecar files that break the code-signature seal.
          rm -rf dist payload
          mkdir -p payload dist
          ditto build/Build/Products/Release/QuarryMenuBar.app payload/QuarryMenuBar.app
          ditto -c -k --keepParent --norsrc --noextattr --noacl payload "dist/$zip"
          ( cd dist && shasum -a 256 "$zip" > checksums.txt )
          cat dist/checksums.txt
          echo "zip=$zip" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create "v${version}" \
            --title "v${version}" \
            --notes "Prebuilt universal (arm64 + x86_64) QuarryMenuBar.app. Install via Homebrew: \`brew install punt-labs/homebrew-tap/quarry-menubar\`." \
            "dist/${{ steps.package.outputs.zip }}" \
            "dist/checksums.txt"
